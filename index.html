<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex — Buscador de Pokemon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo" id="logo" title="Volver al inicio">
    <div class="pokeball-icon"></div>
    <h1>Pokédex</h1>
    <div class="pokeball-icon"></div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search Pokémon by name..." autocomplete="off" />
    </div>
    <select id="type-filter">
      <option value="">All types</option>
    </select>
    <select id="gen-filter">
      <option value="">All generations</option>
      <option value="1">Gen I (1–151)</option>
      <option value="2">Gen II (152–251)</option>
      <option value="3">Gen III (252–386)</option>
      <option value="4">Gen IV (387–493)</option>
      <option value="5">Gen V (494–649)</option>
      <option value="6">Gen VI (650–721)</option>
      <option value="7">Gen VII (722–809)</option>
      <option value="8">Gen VIII (810–905)</option>
      <option value="9">Gen IX (906–1025)</option>
    </select>
    <select id="forms-filter">
      <option value="">All</option>
      <option value="base">Base forms only</option>
      <option value="forms">Megas &amp; forms only</option>
    </select>
    <select id="stat-sort">
      <option value="">Sort by stat ↓</option>
      <option value="total">Total (BST)</option>
      <option value="hp">HP</option>
      <option value="attack">Attack</option>
      <option value="defense">Defense</option>
      <option value="special-attack">Sp. Atk</option>
      <option value="special-defense">Sp. Def</option>
      <option value="speed">Speed</option>
    </select>
  </div>
  <div class="top-right-ui">
    <!-- <a href="team.html" class="team-builder-link" id="team-builder-link">⚔ Team Builder</a> -->
    <a href="coverage.html" class="team-builder-link" id="coverage-link">🛡 Coverage</a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="es" title="Español">
        <svg viewBox="0 0 3 2" width="26" height="18"><rect width="3" height="2" fill="#c60b1e"/><rect y=".5" width="3" height="1" fill="#ffc400"/></svg>
      </button>
      <button class="lang-btn active" data-lang="en" title="English">
        <svg viewBox="0 0 60 30" width="26" height="14"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4"/><path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/></svg>
      </button>
    </div>
    <div class="view-toggle">
      <button id="btn-grid" class="view-btn active" title="Cuadrícula">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
      </button>
      <button id="btn-table" class="view-btn" title="Tabla">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <rect x="1" y="2"  width="14" height="3" rx="1"/>
          <rect x="1" y="7"  width="14" height="3" rx="1"/>
          <rect x="1" y="12" width="14" height="3" rx="1"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div id="grid"></div>
  <div id="table-container"></div>
  <div id="empty">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
    </svg>
    <p>No Pokémon found</p>
  </div>
  <div id="sentinel">
    <div class="loader" id="loader" style="display:none"></div>
  </div>
</main>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal-box" class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Cerrar">✕</button>

    <div class="modal-hero" id="modal-hero">
      <div class="modal-hero-bg" id="modal-hero-bg"></div>
      <div class="modal-img-wrap">
        <img class="modal-img" id="modal-img" src="" alt="" />
        <button class="shiny-btn" id="modal-shiny-btn" title="Ver shiny">✨</button>
      </div>
      <div class="modal-num"  id="modal-num"></div>
      <h2 class="modal-name"  id="modal-name"></h2>
      <div class="modal-types" id="modal-types"></div>
      <div class="modal-forms" id="modal-forms"></div>
      <button id="modal-add-team" class="modal-add-team-btn">+ Add to team</button>
    </div>

    <div class="modal-body">
      <div class="modal-section">
        <div class="section-title" id="section-abilities">Abilities</div>
        <div id="modal-abilities" class="modal-abilities"></div>
      </div>

      <div class="modal-section">
        <div class="section-title" id="section-stats">Base Stats</div>
        <div id="modal-stats"></div>
        <div class="stat-total-row">
          <span class="stat-total-label">Total</span>
          <span class="stat-total-val" id="modal-total"></span>
        </div>
      </div>

      <div class="modal-section">
        <div class="section-title" id="section-def-eff">Type effectiveness (defensive)</div>
        <div id="modal-effectiveness"></div>
      </div>

      <div class="modal-section">
        <div class="section-title" id="section-off-eff">Type effectiveness (offensive)</div>
        <div id="modal-offensive"></div>
      </div>

    </div>
  </div>
</div>

<!-- TEAM BAR -->
<div id="team-bar">
  <div id="team-slots"></div>
  <button id="btn-analyze" disabled>⚡ Analyze team</button>
  <button id="btn-clear-team" title="Clear team">✕</button>
</div>

<!-- ANALYSIS MODAL -->
<div id="analysis-overlay">
  <div id="analysis-box">
    <button class="modal-close" id="analysis-close">✕</button>
    <h3 id="analysis-title">Team Analysis</h3>
    <div id="analysis-content"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
